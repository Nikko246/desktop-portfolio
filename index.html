<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Desktop Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop">
        
        <div class="icon" data-window="resume-window">
            <div class="icon-img">📄</div>
            <div class="icon-label">My Resume.pdf</div>
        </div>

        <div class="icon" data-window="video-window">
            <div class="icon-img">🎬</div>
            <div class="icon-label">Project Demo.mp4</div>
        </div>

        <div class="window" id="resume-window" style="width: 750px; height: 550px; top: 5%; left: 20%;">
            <div class="window-header">
                <span class="window-title">PDF Viewer - resume.pdf</span>
                <div class="window-controls">
                    <button class="win-btn close">X</button>
                </div>
            </div>
            <div class="window-body" style="padding: 0; overflow: hidden;">
                <embed src="files/resume.pdf" type="application/pdf" width="100%" height="100%" />
            </div>
        </div>

        <div class="window" id="video-window" style="width: 500px; height: 380px;">
            <div class="window-header">
                <span class="window-title">Media Player - demo.mp4</span>
                <div class="window-controls">
                    <button class="win-btn close">X</button>
                </div>
            </div>
            <div class="window-body" style="background: #000; padding: 0; display: flex; align-items: center;">
                <video width="100%" height="100%" controls>
                    <source src="videos/demo.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>

    </div>

    <div class="taskbar">
        <button class="start-btn">Start</button>
        <div class="time" id="clock">12:00 PM</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
