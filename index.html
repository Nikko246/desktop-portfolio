<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Desktop Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop">
        
        <div class="icon" id="projects-shortcut">
            <div class="icon-img">📁</div>
            <div class="icon-label">My Projects</div>
        </div>

        <div class="window" id="projects-window">
            <div class="window-header" id="window-header">
                <span class="window-title">My Projects</span>
                <div class="window-controls">
                    <button class="win-btn minimize">—</button>
                    <button class="win-btn close" id="close-btn">X</button>
                </div>
            </div>
            <div class="window-body">
                <h3>Welcome to my portfolio!</h3>
                <p>Here are the projects I have built:</p>
                <ul>
                    <li><strong>Project 1:</strong> E-commerce System</li>
                    <li><strong>Project 2:</strong> Chat Application</li>
                    <li><strong>Project 3:</strong> Task Manager</li>
                </ul>
            </div>
        </div>

    </div>

    <div class="taskbar">
        <button class="start-btn">Start</button>
        <div class="time" id="clock">12:00 PM</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
